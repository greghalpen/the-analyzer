<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Analyzer — The Moody Creative</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; min-height: 100vh; padding: 2rem 1rem; }
  .wrap { max-width: 680px; margin: 0 auto; }
  .hdr { margin-bottom: 2rem; }
  .hdr h1 { font-size: 48px; font-weight: 900; color: #c8f000; letter-spacing: 1px; font-family: Impact, Arial Black, sans-serif; margin-bottom: 6px; }
  .hdr .sub { font-size: 13px; color: #555; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 16px; }
  .hdr p { font-size: 16px; color: #888; line-height: 1.6; }
  .divider { height: 1px; background: #222; margin: 1.5rem 0; }
  textarea { width: 100%; min-height: 160px; padding: 16px; font-size: 15px; border-radius: 8px; border: 1px solid #222; background: #111; color: #fff; resize: vertical; font-family: inherit; line-height: 1.6; }
  textarea:focus { outline: none; border-color: #c8f000; }
  textarea::placeholder { color: #444; }
  .abtn { margin-top: 12px; width: 100%; padding: 16px; background: #c8f000; color: #0a0a0a; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; letter-spacing: 0.5px; transition: opacity 0.15s; }
  .abtn:hover { opacity: 0.88; }
  .abtn:disabled { opacity: 0.4; cursor: not-allowed; }
  .rcard { margin-top: 2rem; border-radius: 8px; border: 1px solid #222; background: #111; overflow: hidden; display: none; }
  .rhdr { padding: 1rem 1.25rem; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 10px; }
  .rhdr span { font-size: 15px; font-weight: 500; color: #fff; }
  .badge { font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 6px; }
  .badge.you { background: #1a3d1a; color: #4caf50; }
  .badge.everyone { background: #3d1a1a; color: #f44336; }
  .badge.almost { background: #3d2e0a; color: #ff9800; }
  .rbody { padding: 1.25rem; font-size: 15px; color: #ccc; line-height: 1.8; white-space: pre-wrap; }
  .resetbtn { display: block; margin-top: 12px; font-size: 13px; color: #555; background: none; border: none; cursor: pointer; padding: 0; text-decoration: underline; }
  .resetbtn:hover { color: #888; }
  .footer { margin-top: 3rem; font-size: 12px; color: #333; text-align: center; letter-spacing: 2px; text-transform: uppercase; }
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="sub">The Moody Creative — Anti-Griftr Workshop</div>
    <h1>THE ANALYZER</h1>
    <div class="divider"></div>
    <p>Paste your marketing copy. We'll tell you if it sounds like you — or like everyone else. No sugarcoating.</p>
  </div>

  <textarea id="ta" placeholder="Paste your marketing copy, bio, email, sales page, Instagram caption — anything you want analyzed..."></textarea>
  <button class="abtn" id="btn" onclick="runIt()">Analyze my copy</button>

  <div class="rcard" id="rcard">
    <div class="rhdr">
      <span>Analysis</span>
      <div class="badge" id="badge"></div>
    </div>
    <div class="rbody" id="rbody"></div>
  </div>
  <button class="resetbtn" id="resetbtn" style="display:none;" onclick="reset()">Analyze something else</button>

  <div class="footer">The Moody Creative &mdash; Make money. Find your voice. Tell the rulebook to go fuck itself.</div>
</div>

<script>
async function runIt() {
  const input = document.getElementById('ta').value.trim();
  if (!input) return;

  const btn = document.getElementById('btn');
  const rcard = document.getElementById('rcard');
  const rbody = document.getElementById('rbody');
  const badge = document.getElementById('badge');
  const resetbtn = document.getElementById('resetbtn');

  btn.disabled = true;
  btn.textContent = 'Analyzing...';
  rcard.style.display = 'block';
  resetbtn.style.display = 'none';
  rbody.textContent = 'Reading between the lines...';
  badge.textContent = '';
  badge.className = 'badge';

  try {
    const res = await fetch('/.netlify/functions/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ copy: input })
    });

    const data = await res.json();
    const text = data.result;

    rbody.textContent = text;

    if (text.includes('Sounds like you.')) {
      badge.textContent = 'Sounds like you';
      badge.className = 'badge you';
    } else if (text.includes('Sounds like everyone else.')) {
      badge.textContent = 'Sounds like everyone else';
      badge.className = 'badge everyone';
    } else {
      badge.textContent = 'Almost there';
      badge.className = 'badge almost';
    }

    resetbtn.style.display = 'block';

  } catch(err) {
    rbody.textContent = 'Something went sideways. Try again in a sec.';
    resetbtn.style.display = 'block';
  }

  btn.disabled = false;
  btn.textContent = 'Analyze my copy';
}

function reset() {
  document.getElementById('ta').value = '';
  document.getElementById('rcard').style.display = 'none';
  document.getElementById('resetbtn').style.display = 'none';
  document.getElementById('btn').disabled = false;
  document.getElementById('btn').textContent = 'Analyze my copy';
}
</script>
</body>
</html>
